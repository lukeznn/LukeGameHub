<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Games | LukeHub</title>

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

      <a href="admin.html">
        Admin
      </a>

    </nav>

  </header>

  <!-- PAGE -->

  <section class="games-page">

    <div class="games-wrapper">

      <div class="hero-badge">
        GAME LIBRARY
      </div>

      <h1 class="page-title">
        Explore Games
      </h1>

      <p class="page-subtitle">
        Browse uploaded games from the community.
      </p>

      <div
        class="games-grid"
        id="games-grid">

      </div>

    </div>

  </section>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      onValue
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    const gamesGrid =
      document.getElementById(
        "games-grid"
      );

    onValue(
      ref(db, "games"),
      snapshot => {

        gamesGrid.innerHTML = "";

        const data =
          snapshot.val();

        if (!data) {

          gamesGrid.innerHTML = `

          <div class="panel">

            <h2>
              No games uploaded.
            </h2>

            <p>
              Upload games from the admin dashboard.
            </p>

          </div>

          `;

          return;

        }

        Object.keys(data)
        .reverse()
        .forEach(key => {

          const game =
            data[key];

          gamesGrid.innerHTML += `

          <div class="game-card">

            <img
              src="${game.image}"
              alt="${game.name}">

            <div class="game-info">

              <h3>
                ${game.name}
              </h3>

              <p>
                ${game.description || ""}
              </p>

              <a
                href="${game.download}"
                target="_blank"
                class="download-btn">

                Download

              </a>

            </div>

          </div>

          `;

        });

      }
    );

  </script>

</body>
</html>

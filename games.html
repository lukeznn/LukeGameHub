<!-- games.html COMPLETO -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Games | LukeHub</title>

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

      <a href="admin.html">
        Admin
      </a>

    </nav>

  </header>

  <!-- PAGE -->

  <section class="games-page">

    <div class="games-wrapper">

      <div class="hero-badge">
        GAME LIBRARY
      </div>

      <h1 class="games-title">
        Explore Games
      </h1>

      <p class="games-subtitle">
        Browse uploaded games from the community.
      </p>

      <div class="games-grid"
        id="games-grid">

      </div>

    </div>

  </section>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      onValue
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055",

      measurementId:
        "G-96HEW587C1"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    const gamesGrid =
      document.getElementById(
        "games-grid"
      );

    const gamesRef =
      ref(db, "games");

    onValue(gamesRef, snapshot => {

      gamesGrid.innerHTML = "";

      const data =
        snapshot.val();

      if (!data) {

        gamesGrid.innerHTML = `

        <div class="empty-games">

          <h2>
            No games uploaded yet.
          </h2>

          <p>
            Upload games from the admin dashboard.
          </p>

        </div>

        `;

        return;

      }

      Object.keys(data)
      .reverse()
      .forEach(key => {

        const game =
          data[key];

        gamesGrid.innerHTML += `

        <div class="game-card">

          <img
            src="${game.image}"
            alt="${game.name}">

          <div class="game-info">

            <h3>
              ${game.name}
            </h3>

            <p>
              ${game.description || "No description"}
            </p>

            <a
              href="${game.download}"
              target="_blank"
              class="download-btn">

              Download

            </a>

          </div>

        </div>

        `;

      });

    });

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Games | LukeHub</title>

  <!-- FONT -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

      <a href="admin.html">
        Admin
      </a>

    </nav>

  </header>

  <!-- MAIN -->

  <main class="games-page">

    <div class="section-header">

      <h2>
        Featured Games
      </h2>

      <p>
        Community downloads
      </p>

    </div>

    <!-- GRID -->

    <div class="games-grid"
      id="games-grid">

    </div>

  </main>

  <!-- FOOTER -->

  <footer class="footer">

    © 2026 LukeHub

  </footer>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      onValue
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /* FIREBASE CONFIG */

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055",

      measurementId:
        "G-96HEW587C1"

    };

    /* INIT */

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    /* GRID */

    const grid =
      document.getElementById(
        "games-grid"
      );

    /* LOAD GAMES */

    const gamesRef =
      ref(db, "games");

    onValue(
      gamesRef,
      snapshot => {

        grid.innerHTML = "";

        const data =
          snapshot.val();

        if (!data) {

          grid.innerHTML = `
            <p>
              Nenhum jogo publicado.
            </p>
          `;

          return;

        }

        Object.keys(data)
        .forEach(key => {

          const game =
            data[key];

          grid.innerHTML += `

          <div class="game-card">

            <img
              src="${game.image}">

            <div class="game-content">

              <h3>
                ${game.name}
              </h3>

              <p>
                Community download
              </p>

              <a href="${game.download}"
                target="_blank">

                <button class="install-btn">

                  Download

                </button>

              </a>

            </div>

          </div>

          `;

        });

      }
    );

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Games | LukeHub</title>

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

      <a href="admin.html">
        Admin
      </a>

    </nav>

  </header>

  <!-- HERO -->

  <section class="games-hero">

    <div class="games-hero-content">

      <span class="games-badge">
        COMMUNITY PLATFORM
      </span>

      <h1>
        Explore Games
      </h1>

      <p>
        Discover community uploads,
        launchers and downloads.
      </p>

    </div>

  </section>

  <!-- GAMES -->

  <main class="modern-games-container">

    <div class="games-grid"
      id="games-grid">

    </div>

  </main>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      onValue
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055",

      measurementId:
        "G-96HEW587C1"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    const grid =
      document.getElementById(
        "games-grid"
      );

    const gamesRef =
      ref(db, "games");

    onValue(
      gamesRef,
      snapshot => {

        grid.innerHTML = "";

        const data =
          snapshot.val();

        if (!data) {

          grid.innerHTML = `

          <div class="empty-state">

            <h2>
              Nenhum jogo publicado
            </h2>

          </div>

          `;

          return;

        }

        Object.keys(data)
        .reverse()
        .forEach(key => {

          const game =
            data[key];

          grid.innerHTML += `

          <div class="modern-game-card">

            <div class="card-image">

              <img
                src="${game.image}">

            </div>

            <div class="modern-game-content">

              <div class="game-top">

                <h2>
                  ${game.name}
                </h2>

              </div>

              <p class="game-description">

                ${game.description || "No description provided."}

              </p>

              <a href="${game.download}"
                target="_blank">

                <button class="download-modern-btn">

                  Download

                </button>

              </a>

            </div>

          </div>

          `;

        });

      }
    );

  </script>

</body>
</html>

<!-- admin.html COMPLETO -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Admin Dashboard | LukeHub</title>

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

    </nav>

  </header>

  <!-- LOGIN -->

  <div class="admin-container"
    id="login-screen">

    <div class="admin-card login-card">

      <div class="dashboard-badge">
        ADMIN PANEL
      </div>

      <h1>
        Welcome Back
      </h1>

      <p class="dashboard-subtitle">
        Login to manage uploaded games.
      </p>

      <input
        type="email"
        id="email"
        placeholder="Email">

      <input
        type="password"
        id="password"
        placeholder="Senha">

      <button
        onclick="login()"
        class="primary-btn">

        Entrar

      </button>

    </div>

  </div>

  <!-- DASHBOARD -->

  <div class="dashboard"
    id="dashboard"
    style="display:none;">

    <div class="dashboard-header">

      <div>

        <div class="dashboard-badge">
          CONTROL CENTER
        </div>

        <h1>
          Dashboard
        </h1>

      </div>

      <button
        onclick="logout()"
        class="secondary-btn">

        Logout

      </button>

    </div>

    <!-- UPLOAD -->

    <div class="admin-card">

      <h2>
        Upload Game
      </h2>

      <p class="dashboard-subtitle">
        Add a new game to the platform.
      </p>

      <input
        type="text"
        id="game-name"
        placeholder="Nome do jogo">

      <input
        type="text"
        id="game-image"
        placeholder="Link da imagem">

      <input
        type="text"
        id="game-download"
        placeholder="Link do download">

      <textarea
        id="game-description"
        placeholder="Descrição do jogo"
        class="admin-textarea"></textarea>

      <button
        onclick="addGame()"
        class="primary-btn">

        Publicar Jogo

      </button>

    </div>

    <!-- GAMES -->

    <div class="admin-card">

      <h2>
        Uploaded Games
      </h2>

      <p class="dashboard-subtitle">
        Manage uploaded content.
      </p>

      <div id="games-list">

      </div>

    </div>

  </div>

  <!-- EDIT MODAL -->

  <div class="editor-modal"
    id="editor-modal">

    <div class="editor-card">

      <div class="editor-top">

        <h2>
          Edit Game
        </h2>

        <button
          class="close-btn"
          onclick="closeEditor()">

          ✕

        </button>

      </div>

      <input
        type="text"
        id="edit-name"
        placeholder="Nome">

      <input
        type="text"
        id="edit-image"
        placeholder="Imagem">

      <input
        type="text"
        id="edit-download"
        placeholder="Download">

      <textarea
        id="edit-description"
        class="admin-textarea"
        placeholder="Descrição"></textarea>

      <div class="editor-actions">

        <button
          class="save-btn"
          onclick="saveEdit()">

          Save Changes

        </button>

        <button
          class="trash-btn"
          onclick="deleteCurrentGame()">

          🗑

        </button>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      push,
      onValue,
      remove,
      update
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055",

      measurementId:
        "G-96HEW587C1"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    let currentGameId =
      null;

    const ADMIN_EMAIL =
      "admin@lukehub.com";

    const ADMIN_PASSWORD =
      "123456";

    /* LOGIN */

    window.login = function() {

      const email =
        document.getElementById(
          "email"
        ).value;

      const password =
        document.getElementById(
          "password"
        ).value;

      if (
        email === ADMIN_EMAIL &&
        password === ADMIN_PASSWORD
      ) {

        localStorage.setItem(
          "adminLogged",
          "true"
        );

        showDashboard();

      } else {

        alert(
          "Dados incorretos"
        );

      }

    }

    /* LOGOUT */

    window.logout = function() {

      localStorage.removeItem(
        "adminLogged"
      );

      location.reload();

    }

    /* SHOW DASHBOARD */

    function showDashboard() {

      document
        .getElementById(
          "login-screen"
        )
        .style.display = "none";

      document
        .getElementById(
          "dashboard"
        )
        .style.display = "block";

      loadGames();

    }

    /* CHECK LOGIN */

    if (
      localStorage.getItem(
        "adminLogged"
      ) === "true"
    ) {

      showDashboard();

    }

    /* ADD GAME */

    window.addGame = function() {

      const name =
        document.getElementById(
          "game-name"
        ).value;

      const image =
        document.getElementById(
          "game-image"
        ).value;

      const download =
        document.getElementById(
          "game-download"
        ).value;

      const description =
        document.getElementById(
          "game-description"
        ).value;

      if (
        !name ||
        !image ||
        !download
      ) {

        alert(
          "Preencha tudo"
        );

        return;

      }

      push(
        ref(db, "games"),
        {
          name,
          image,
          download,
          description
        }
      );

      alert(
        "Jogo publicado"
      );

      document.getElementById(
        "game-name"
      ).value = "";

      document.getElementById(
        "game-image"
      ).value = "";

      document.getElementById(
        "game-download"
      ).value = "";

      document.getElementById(
        "game-description"
      ).value = "";

    }

    /* LOAD */

    function loadGames() {

      const gamesList =
        document.getElementById(
          "games-list"
        );

      const gamesRef =
        ref(db, "games");

      onValue(
        gamesRef,
        snapshot => {

          gamesList.innerHTML = "";

          const data =
            snapshot.val();

          if (!data) return;

          Object.keys(data)
          .reverse()
          .forEach(key => {

            const game =
              data[key];

            gamesList.innerHTML += `

            <div class="uploaded-game">

              <img
                src="${game.image}">

              <div class="uploaded-info">

                <h3>
                  ${game.name}
                </h3>

                <p>
                  ${game.description || "No description"}
                </p>

              </div>

              <button
                class="edit-btn"
                onclick="openEditor(
                  '${key}',
                  \`${game.name}\`,
                  \`${game.image}\`,
                  \`${game.download}\`,
                  \`${game.description || ""}\`
                )">

                ✏️

              </button>

            </div>

            `;

          });

        }
      );

    }

    /* OPEN */

    window.openEditor = function(
      id,
      name,
      image,
      download,
      description
    ) {

      currentGameId = id;

      document
        .getElementById(
          "editor-modal"
        )
        .style.display = "flex";

      document
        .getElementById(
          "edit-name"
        )
        .value = name;

      document
        .getElementById(
          "edit-image"
        )
        .value = image;

      document
        .getElementById(
          "edit-download"
        )
        .value = download;

      document
        .getElementById(
          "edit-description"
        )
        .value = description;

    }

    /* CLOSE */

    window.closeEditor =
    function() {

      document
        .getElementById(
          "editor-modal"
        )
        .style.display = "none";

    }

    /* SAVE */

    window.saveEdit =
    function() {

      const name =
        document.getElementById(
          "edit-name"
        ).value;

      const image =
        document.getElementById(
          "edit-image"
        ).value;

      const download =
        document.getElementById(
          "edit-download"
        ).value;

      const description =
        document.getElementById(
          "edit-description"
        ).value;

      update(
        ref(
          db,
          "games/" + currentGameId
        ),
        {
          name,
          image,
          download,
          description
        }
      );

      closeEditor();

    }

    /* DELETE */

    window.deleteCurrentGame =
    function() {

      remove(
        ref(
          db,
          "games/" + currentGameId
        )
      );

      closeEditor();

    }

  </script>

</body>
</html>

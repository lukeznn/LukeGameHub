<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>LukeHub Admin</title>

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

      <a href="admin.html">
        Admin
      </a>

    </nav>

  </header>

  <!-- LOGIN -->

  <div
    class="login-screen"
    id="login-screen">

    <div class="login-box">

      <div class="hero-badge">
        ADMIN PANEL
      </div>

      <h1>
        Login
      </h1>

      <p>
        Access the LukeHub dashboard.
      </p>

      <input
        type="email"
        id="email"
        placeholder="Email">

      <input
        type="password"
        id="password"
        placeholder="Password">

      <button
        class="primary-btn"
        onclick="login()">

        Enter Dashboard

      </button>

    </div>

  </div>

  <!-- DASHBOARD -->

  <div
    class="dashboard"
    id="dashboard"
    style="display:none;">

    <div class="games-wrapper">

      <!-- UPLOAD -->

      <div class="panel">

        <h2>
          Upload Game
        </h2>

        <p>
          Add a new game.
        </p>

        <input
          type="text"
          id="game-name"
          placeholder="Game name">

        <input
          type="text"
          id="game-image"
          placeholder="Image URL">

        <input
          type="text"
          id="game-download"
          placeholder="Download URL">

        <textarea
          id="game-description"
          placeholder="Game description"></textarea>

        <button
          class="primary-btn"
          onclick="uploadGame()">

          Upload Game

        </button>

      </div>

      <!-- UPLOADED -->

      <div class="panel">

        <h2>
          Uploaded Games
        </h2>

        <p>
          Edit uploaded games.
        </p>

        <div
          class="uploaded-games"
          id="uploaded-games">

        </div>

      </div>

    </div>

  </div>

  <!-- EDIT MODAL -->

  <div
    class="modal"
    id="editor-modal">

    <div class="modal-box">

      <h2>
        Edit Game
      </h2>

      <p>
        Modify game information.
      </p>

      <input
        type="text"
        id="edit-name"
        placeholder="Game name">

      <input
        type="text"
        id="edit-image"
        placeholder="Image URL">

      <input
        type="text"
        id="edit-download"
        placeholder="Download URL">

      <textarea
        id="edit-description"
        placeholder="Game description"></textarea>

      <div class="modal-actions">

        <button
          class="secondary-btn"
          onclick="closeEditor()">

          Cancel

        </button>

        <button
          class="danger-btn"
          onclick="openDeleteConfirm()">

          Delete

        </button>

        <button
          class="primary-btn"
          onclick="saveEdit()">

          Save

        </button>

      </div>

    </div>

  </div>

  <!-- DELETE MODAL -->

  <div
    class="modal"
    id="delete-modal">

    <div class="modal-box">

      <h2>
        Delete Game
      </h2>

      <p>
        Are you sure you want to delete this game?
      </p>

      <div class="modal-actions">

        <button
          class="secondary-btn"
          onclick="closeDeleteModal()">

          Cancel

        </button>

        <button
          class="danger-btn"
          id="confirm-delete-btn">

          Delete in 5s

        </button>

      </div>

    </div>

  </div>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      push,
      onValue,
      update,
      remove
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    const auth =
      getAuth(app);

    let currentGameId = null;

    window.login = async function() {

      const email =
        document.getElementById(
          "email"
        ).value;

      const password =
        document.getElementById(
          "password"
        ).value;

      try {

        await signInWithEmailAndPassword(
          auth,
          email,
          password
        );

        document.getElementById(
          "login-screen"
        ).style.display = "none";

        document.getElementById(
          "dashboard"
        ).style.display = "block";

      }

      catch {

        alert(
          "Invalid login."
        );

      }

    }

    window.uploadGame = function() {

      const name =
        document.getElementById(
          "game-name"
        ).value;

      const image =
        document.getElementById(
          "game-image"
        ).value;

      const download =
        document.getElementById(
          "game-download"
        ).value;

      const description =
        document.getElementById(
          "game-description"
        ).value;

      push(
        ref(db, "games"),
        {
          name,
          image,
          download,
          description
        }
      );

    }

    onValue(
      ref(db, "games"),
      snapshot => {

        const data =
          snapshot.val();

        const container =
          document.getElementById(
            "uploaded-games"
          );

        container.innerHTML = "";

        if (!data) return;

        Object.keys(data)
        .reverse()
        .forEach(key => {

          const game =
            data[key];

          container.innerHTML += `

          <div class="admin-game">

            <img src="${game.image}">

            <div class="admin-game-info">

              <h3>
                ${game.name}
              </h3>

              <p>
                ${game.description || ""}
              </p>

            </div>

            <button
              class="edit-btn"
              onclick="openEditor('${key}')">

              ✏️

            </button>

          </div>

          `;

        });

        window.gamesData = data;

      }
    );

    window.openEditor = function(id) {

      currentGameId = id;

      const game =
        window.gamesData[id];

      document.getElementById(
        "edit-name"
      ).value = game.name;

      document.getElementById(
        "edit-image"
      ).value = game.image;

      document.getElementById(
        "edit-download"
      ).value = game.download;

      document.getElementById(
        "edit-description"
      ).value = game.description;

      document.getElementById(
        "editor-modal"
      ).style.display = "flex";

    }

    window.closeEditor = function() {

      document.getElementById(
        "editor-modal"
      ).style.display = "none";

    }

    window.saveEdit = function() {

      update(
        ref(db, "games/" + currentGameId),
        {
          name:
            document.getElementById(
              "edit-name"
            ).value,

          image:
            document.getElementById(
              "edit-image"
            ).value,

          download:
            document.getElementById(
              "edit-download"
            ).value,

          description:
            document.getElementById(
              "edit-description"
            ).value
        }
      );

      closeEditor();

    }

    window.openDeleteConfirm = function() {

      const modal =
        document.getElementById(
          "delete-modal"
        );

      const btn =
        document.getElementById(
          "confirm-delete-btn"
        );

      modal.style.display = "flex";

      let seconds = 5;

      btn.disabled = true;

      btn.innerText =
        `Delete in ${seconds}s`;

      const timer = setInterval(() => {

        seconds--;

        btn.innerText =
          `Delete in ${seconds}s`;

        if (seconds <= 0) {

          clearInterval(timer);

          btn.disabled = false;

          btn.innerText =
            "Delete Game";

          btn.onclick = () => {

            remove(
              ref(
                db,
                "games/" + currentGameId
              )
            );

            document.getElementById(
              "delete-modal"
            ).style.display = "none";

            document.getElementById(
              "editor-modal"
            ).style.display = "none";

          };

        }

      }, 1000);

    }

    window.closeDeleteModal = function() {

      document.getElementById(
        "delete-modal"
      ).style.display = "none";

    }

  </script>

</body>
</html>

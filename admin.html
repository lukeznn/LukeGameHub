<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Admin Dashboard | LukeHub</title>

  <!-- FONT -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      LukeHub
    </div>

    <nav>

      <a href="index.html">
        Home
      </a>

      <a href="games.html">
        Games
      </a>

    </nav>

  </header>

  <!-- LOGIN -->

  <div class="admin-container"
    id="login-screen">

    <div class="admin-card">

      <h1>
        Admin Login
      </h1>

      <input
        type="email"
        id="email"
        placeholder="Email">

      <input
        type="password"
        id="password"
        placeholder="Senha">

      <button
        onclick="login()"
        class="primary-btn">

        Entrar

      </button>

    </div>

  </div>

  <!-- DASHBOARD -->

  <div class="dashboard"
    id="dashboard"
    style="display:none;">

    <div class="dashboard-header">

      <h1>
        Dashboard
      </h1>

      <button
        onclick="logout()"
        class="secondary-btn">

        Logout

      </button>

    </div>

    <!-- ADD GAME -->

    <div class="admin-card">

      <h2>
        Upload Game
      </h2>

      <input
        type="text"
        id="game-name"
        placeholder="Nome do jogo">

      <input
        type="text"
        id="game-image"
        placeholder="Link da imagem">

      <input
        type="text"
        id="game-download"
        placeholder="Link do download">

      <button
        onclick="addGame()"
        class="primary-btn">

        Publicar Jogo

      </button>

    </div>

    <!-- GAME LIST -->

    <div class="admin-card">

      <h2>
        Uploaded Games
      </h2>

      <div id="games-list">

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      push,
      onValue,
      remove
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /* FIREBASE CONFIG */

    const firebaseConfig = {

      apiKey:
        "AIzaSyASarP-JJbYwSjrfRMzGOvBnHMKWYgvJus",

      authDomain:
        "lukegamehub.firebaseapp.com",

      databaseURL:
        "https://lukegamehub-default-rtdb.firebaseio.com",

      projectId:
        "lukegamehub",

      storageBucket:
        "lukegamehub.firebasestorage.app",

      messagingSenderId:
        "1043413187920",

      appId:
        "1:1043413187920:web:9475d6268bac3f803d8055",

      measurementId:
        "G-96HEW587C1"

    };

    /* INIT */

    const app =
      initializeApp(firebaseConfig);

    const db =
      getDatabase(app);

    /* ADMIN LOGIN */

    const ADMIN_EMAIL =
      "admin@lukehub.com";

    const ADMIN_PASSWORD =
      "123456";

    /* LOGIN */

    window.login = function() {

      const email =
        document.getElementById(
          "email"
        ).value;

      const password =
        document.getElementById(
          "password"
        ).value;

      if (
        email === ADMIN_EMAIL &&
        password === ADMIN_PASSWORD
      ) {

        localStorage.setItem(
          "adminLogged",
          "true"
        );

        showDashboard();

      } else {

        alert(
          "Dados incorretos"
        );

      }

    }

    /* LOGOUT */

    window.logout = function() {

      localStorage.removeItem(
        "adminLogged"
      );

      location.reload();

    }

    /* SHOW DASHBOARD */

    function showDashboard() {

      document
        .getElementById(
          "login-screen"
        )
        .style.display = "none";

      document
        .getElementById(
          "dashboard"
        )
        .style.display = "block";

      loadGames();

    }

    /* CHECK LOGIN */

    if (
      localStorage.getItem(
        "adminLogged"
      ) === "true"
    ) {

      showDashboard();

    }

    /* ADD GAME */

    window.addGame = function() {

      const name =
        document.getElementById(
          "game-name"
        ).value;

      const image =
        document.getElementById(
          "game-image"
        ).value;

      const download =
        document.getElementById(
          "game-download"
        ).value;

      if (
        !name ||
        !image ||
        !download
      ) {

        alert(
          "Preencha tudo"
        );

        return;

      }

      push(
        ref(db, "games"),
        {
          name,
          image,
          download
        }
      );

      alert(
        "Jogo publicado"
      );

      document.getElementById(
        "game-name"
      ).value = "";

      document.getElementById(
        "game-image"
      ).value = "";

      document.getElementById(
        "game-download"
      ).value = "";

    }

    /* LOAD GAMES */

    function loadGames() {

      const gamesList =
        document.getElementById(
          "games-list"
        );

      const gamesRef =
        ref(db, "games");

      onValue(
        gamesRef,
        snapshot => {

          gamesList.innerHTML = "";

          const data =
            snapshot.val();

          if (!data) return;

          Object.keys(data)
          .forEach(key => {

            const game =
              data[key];

            gamesList.innerHTML += `

            <div class="uploaded-game">

              <img
                src="${game.image}">

              <div class="uploaded-info">

                <h3>
                  ${game.name}
                </h3>

                <p>
                  ${game.download}
                </p>

              </div>

              <button
                class="delete-btn"
                onclick="deleteGame('${key}')">

                Delete

              </button>

            </div>

            `;

          });

        }
      );

    }

    /* DELETE */

    window.deleteGame =
    function(id) {

      remove(
        ref(
          db,
          "games/" + id
        )
      );

    }

  </script>

</body>
</html>
